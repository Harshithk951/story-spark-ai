name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed workspaces
        id: changes
        shell: bash
        run: |
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")"
          echo "$files"

          if echo "$files" | grep -q '^frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$files" | grep -q '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v2
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        run: pnpm install --frozen-lockfile

      - name: Rebuild native bindings for current platform
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        run: pnpm rebuild

      - name: Build backend
        if: steps.changes.outputs.backend == 'true'
        run: pnpm --filter story-spark-ai-backend build

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true'
        run: pnpm --filter story-spark-ai-frontend build
